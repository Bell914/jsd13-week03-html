<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Form</title>
  </head>
  <body>
    <h1>Mala-tang</h1>
    <p>order here</p>

    <form action="" method="get">
      <!-- ช่องชื่อผู้ใช้: label+placeholder ตามโจทย์ -->
      <label for="cname">กรอกชื่อของคุณ :</label>
      <input
        id="cname"
        type="text"
        name="cname"
        placeholder="กรอกชื่อของคุณ"
        required
      />
      <br /><br />

      <!-- ช่องรหัสผ่าน: ต้องซ่อนเป็นจุดดำ -->
      <label for="password">รหัสผ่าน :</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="กรอกรหัสผ่าน"
      />
      <br /><br />

      <!-- ช่องอีเมล: ต้องบังคับกรอก -->
      <label for="email">อีเมล :</label>
      <input
        id="email"
        type="email"
        name="email"
        placeholder="กรอกอีเมล"
        required
      />
      <br /><br />

      <!-- เลือกน้ำซุป (radio เดิม แก้ให้มี id/for จับคู่ครบ) -->
      <p>เลือกน้ำซุป</p>
      <label for="soup1">
        ซุปหม่าล่า
        <input type="radio" name="soup" id="soup1" value="mala" />
      </label>
      <label for="soup2">
        หม่าล่านมสด
        <input type="radio" name="soup" id="soup2" value="malamilk" />
      </label>
      <label for="soup3">
        ซุปน้ำดำ
        <input type="radio" name="soup" id="soup3" value="blacksoup" />
      </label>
      <label for="sukisoup">
        ซุปสุกี้
        <input type="radio" name="soup" id="sukisoup" value="suki" />
      </label>
      <br />

      <!-- เลือกแพ็กเกจ: radio ต้องเลือกได้แค่ 1 อัน -->
      <p>เลือกแพ็กเกจ</p>
      <label for="free">
        Free
        <input type="radio" id="free" name="package" value="free" />
      </label>
      <label for="premium">
        Premium
        <input type="radio" id="premium" name="package" value="premium" />
      </label>
      <br /><br />

      <!-- เลือกของที่ชอบ (checkbox เดิม แก้ label for="" ที่ว่างอยู่) -->
      <p>เลือกของที่ชอบ</p>
      <label for="meat1">
        เนื้อหมู
        <input type="checkbox" name="meat" id="meat1" value="pork" />
      </label>
      <label for="meat2">
        เนื้อไก่
        <input type="checkbox" name="meat" id="meat2" value="chicken" />
      </label>
      <label for="veg1">
        เห็ด
        <input type="checkbox" name="vegetable" id="veg1" value="mushroom" />
      </label>
      <label for="veg2">
        ผักกวางตุ้ง
        <input type="checkbox" name="vegetable" id="veg2" value="bokchoy" />
      </label>
      <br /><br />

      <div style="margin-top: 20px;">
        <button type="submit">ยืนยันการสมัคร</button>
      </div>
    </form>
  </body>
</html>
